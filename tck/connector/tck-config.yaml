#################################################################################
#
# TCK Connector — INT Environment Configuration
#
# This file is a ready-to-use template for the Catena-X INT (integration)
# environment.  Replace all <PLACEHOLDER> tokens with real values, then run:
#
#   python tck_e2e_saturn_0-11-X_simple.py --config tck-int-config.yaml
#
# or run all 6 tests at once:
#
#   ./run_all_tests.sh --config tck-int-config.yaml
#
# Sections
# --------
#   jupiter   → used by: tck_e2e_jupiter_0-10-X_simple|detailed
#   saturn    → used by: tck_e2e_saturn_0-11-X_simple|detailed and
#                        tck_e2e_saturn_0-11-X_simple_did|detailed_did
#
# Backend base_url
# ----------------
#   Do NOT include a UUID here.  The test loader appends /urn:uuid:<uuid4>
#   at runtime so that every run gets a unique resource path.
#
# Null / optional fields
# ----------------------
#   Leave optional fields as ~ (YAML null) to let the SDK use its default.
#
# How to obtain INT values
# ------------------------
#   Provider / Consumer URLs & API keys  →  your EDC deployment team or
#                                           Helm values of your INT cluster
#   BPNLs                                →  BPDM INT service or your
#                                           organisation's registration record
#   DIDs                                 →  Portal INT  (Administration →
#                                           Company → Company Identity)
#   Backend URL                          →  simple-data-backend deployment on INT
#################################################################################

# ---------------------------------------------------------------------------
# Jupiter  (EDC 0.8–0.10.x  |  protocol: dataspace-protocol-http)
# ---------------------------------------------------------------------------
jupiter:
  provider:
    base_url: "https://jupiter-edc-provider-ichub-control.int.catena-x.net"
    dma_path: "/management"                                  # Management API path (default: /management)
    api_key: "ACA176440A8BDD3954FCEC3552BF8985AFB75608A57B9121EA809791854AAA2BEDBF85333572E8DECE9537D69697D6BA28EA26174085242CB536B7877E219CAC"
    bpn: "BPNL0000000093Q7"                                  # e.g. BPNL00000000PROV
    dsp_url: "https://jupiter-edc-provider-ichub-control.int.catena-x.net/api/v1/dsp"
  consumer:
    base_url: "https://jupiter-edc-consumer-ichub-control.int.catena-x.net"
    dma_path: "/management"                                  # Management API path (default: /management)
    api_key: "ACA176440A8BDD3954FCEC3552BF8985AFB75608A57B9121EA809791854AAA2BEDBF85333572E8DECE9537D69697D6BA28EA26174085242CB536B7877E219CAC"
    bpn: "BPNL00000003CRHK"                                  # e.g. BPNL00000000CONS
  backend:
    base_url: "https://jupiter-storage-ichub.int.catena-x.net"
    api_key: ~                             # set to ~ if no auth needed
  policies:
    protocol: "dataspace-protocol-http"
    negotiation_context:
      - "https://w3id.org/tractusx/policy/v1.0.0"
      - "http://www.w3.org/ns/odrl.jsonld"
      - "@vocab": "https://w3id.org/edc/v0.0.1/ns/"
    access_policy:
      profile: "cx-policy:profile2405"
      context:
        - "https://w3id.org/tractusx/policy/v1.0.0"
        - "http://www.w3.org/ns/odrl.jsonld"
        - tx: "https://w3id.org/tractusx/v0.0.1/ns/"
          "@vocab": "https://w3id.org/edc/v0.0.1/ns/"
      permissions:
        - action: "use"
          constraint:
            leftOperand: "tx:BusinessPartnerNumber"
            operator: "eq"
            rightOperand: ~    # Auto-set to consumer BPN at runtime
    usage_policy:
      profile: "cx-policy:profile2405"
      context:
        - "https://w3id.org/tractusx/policy/v1.0.0"
        - "http://www.w3.org/ns/odrl.jsonld"
        - "@vocab": "https://w3id.org/edc/v0.0.1/ns/"
      permissions:
        - action: "use"
          constraint:
            and:
              - leftOperand: "Membership"
                operator: "eq"
                rightOperand: "active"
              - leftOperand: "FrameworkAgreement"
                operator: "eq"
                rightOperand: "DataExchangeGovernance:1.0"
              - leftOperand: "UsagePurpose"
                operator: "eq"
                rightOperand: "cx.core.industrycore:1"

# ---------------------------------------------------------------------------
# Saturn  (EDC 0.11.x - 0.12.x+  |  protocol: dataspace-protocol-http:2025-1)
# Supports both BPNL discovery and DID discovery — bpn and did are both set.
# BPNL scripts use discovery_mode="bpnl"; DID scripts use discovery_mode="did".
# ---------------------------------------------------------------------------
saturn:
  provider:
    base_url: "https://edc-provider-ichub-control.int.catena-x.net"
    dma_path: "/management"                                  # Management API path (default: /management)
    api_key: "ACA176440A8BDD3954FCEC3552BF8985AFB75608A57B9121EA809791854AAA2BEDBF85333572E8DECE9537D69697D6BA28EA26174085242CB536B7877E219CAC"
    bpn: "BPNL0000000093Q7"                                  # e.g. BPNL00000000PROV
    dsp_url: "https://edc-provider-ichub-control.int.catena-x.net/api/v1/dsp"
    dsp_url_did: "https://edc-provider-ichub-control.int.catena-x.net/api/v1/dsp/2025-1"  # Used by DID-mode scripts only
    did: "did:web:portal-backend.int.catena-x.net:api:administration:staticdata:did:BPNL0000000093Q7"
  consumer:
    base_url: "https://edc-consumer-ichub-control.int.catena-x.net"
    dma_path: "/management"                                  # Management API path (default: /management)
    api_key: "ACA176440A8BDD3954FCEC3552BF8985AFB75608A57B9121EA809791854AAA2BEDBF85333572E8DECE9537D69697D6BA28EA26174085242CB536B7877E219CAC"
    bpn: "BPNL00000003CRHK"                                  # e.g. BPNL00000000CONS
    did: "did:web:portal-backend.int.catena-x.net:api:administration:staticdata:did:BPNL00000003CRHK"
  backend:
    base_url: "https://storage-ichub.int.catena-x.net"
    api_key: ~                             # set to ~ if no auth needed
  policies:
    protocol: "dataspace-protocol-http:2025-1"
    negotiation_context:
      - "https://w3id.org/catenax/2025/9/policy/odrl.jsonld"
      - "https://w3id.org/catenax/2025/9/policy/context.jsonld"
      - "@vocab": "https://w3id.org/edc/v0.0.1/ns/"
    # BPNL discovery: BusinessPartnerNumber-based access, implicit default context
    access_policy:
      permissions:
        - action: "access"
          constraint:
            leftOperand: "BusinessPartnerNumber"
            operator: "isAnyOf"
            rightOperand: ~    # Auto-set to consumer BPN at runtime
    # DID discovery: Membership-based access with explicit Catena-X 2025-9 context
    access_policy_did:
      context:
        - "https://w3id.org/catenax/2025/9/policy/odrl.jsonld"
        - "https://w3id.org/catenax/2025/9/policy/context.jsonld"
        - "@vocab": "https://w3id.org/edc/v0.0.1/ns/"
      permissions:
        - action: "access"
          constraint:
            leftOperand: "Membership"
            operator: "eq"
            rightOperand: "active"
    # Shared usage policy for both BPNL and DID discovery modes
    usage_policy:
      permissions:
        - action: "use"
          constraint:
            and:
              - leftOperand: "Membership"
                operator: "eq"
                rightOperand: "active"
              - leftOperand: "FrameworkAgreement"
                operator: "eq"
                rightOperand: "DataExchangeGovernance:1.0"
              - leftOperand: "UsagePurpose"
                operator: "isAnyOf"
                rightOperand: "cx.core.industrycore:1"
